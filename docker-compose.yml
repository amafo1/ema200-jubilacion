version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ema200-postgres
    environment:
      POSTGRES_DB: ema200_jubilacion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ema200-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ema200-backend
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ema200_jubilacion
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - ema200-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ema200-frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ema200-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  ema200-network:
    driver: bridge
